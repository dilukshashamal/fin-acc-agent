events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configuration for SSE streaming support
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    upstream workspace-ops {
        server workspace-ops:8000;
    }

    upstream ai-agent {
        server ai-agent:8080;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;

        # Add global headers for CORS if needed
        # (Though services handle CORS, it is good practice to configure gateway headers)

        # Workspace SaaS API
        location /api/v1/workspace/ {
            proxy_pass http://workspace-ops;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI Agent API and streaming endpoint
        location /api/v1/agent/ {
            proxy_pass http://ai-agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for Server-Sent Events (SSE) streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            
            # SSE Headers
            proxy_set_header Connection "keep-alive";
            proxy_set_header Content-Type "text/event-stream";
        }

        # Vite dev server and WebSocket (for HMR)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets for Vite Hot Module Replacement (HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
